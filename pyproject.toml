[project]
name = "evergis-monorepo"
version = "0.1.0"
description = "EverGIS Python API and Tools"
requires-python = ">=3.10"

# Monorepo root: not an installable project itself. Install the packages
# under `packages/` individually (see the README).

[tool.pytest.ini_options]
minversion = "8.0"
# importlib mode: test packages across the monorepo share module names
# (tests.test_* etc.) and would collide under the default import mode.
addopts = "-q --import-mode=importlib"
# only test_*.py: the default also matches *_test.py and would pick up
# example scripts like examples/catalog/data_source_test.py
python_files = ["test_*.py"]
testpaths = [
  "packages/evergis_api",
  "packages/evergis_tools",
  "packages/evergis_tutorial_setup",
]

[tool.ruff]
line-length = 100
target-version = "py310"
# autogenerated client - never hand-edited, never linted
extend-exclude = ["packages/evergis_api/evergis_api/_generated"]

[tool.ruff.lint.per-file-ignores]
# re-export hubs: unused-import is the point
"**/__init__.py" = ["F401", "E402"]
# examples mutate sys.path / load_dotenv before imports
"packages/*/examples/**" = ["E402"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
