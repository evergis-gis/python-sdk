name: CI

# Public-side CI for the GitHub snapshot (github.com/evergis-gis/python-sdk).
# This file is inert on GitLab (GitLab ignores .github/); it runs only on
# GitHub. Lint + offline unit tests; integration tests self-skip without
# EVERGIS_* env.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          pip install -e packages/evergis_api -e packages/evergis_tools -e packages/evergis_tutorial_setup
      - name: Lint
        run: ruff check packages/
      - name: Test
        run: pytest packages/evergis_api packages/evergis_tools packages/evergis_tutorial_setup
