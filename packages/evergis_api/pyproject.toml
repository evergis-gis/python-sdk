[project]
name = "evergis-api"
version = "0.2"
description = "EverGIS Python API client (wrapper over generated code)"
readme = "README.md"
license = "Apache-2.0"
authors = [{ name = "eldar", email = "eldarmamedov@gmail.com" }]
requires-python = ">=3.10"
dependencies = [
  "httpx>=0.24.0",
  "pydantic>=2.0.0",
  "typing-extensions>=4.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["evergis_api"]

