[project]
name = "evergis-tutorial-setup"
version = "0.1.0"
description = "Per-user tutorial workspace provisioner for the EverGIS examples"
readme = "README.md"
authors = [{ name = "eldar", email = "eldarmamedov@gmail.com" }]
requires-python = ">=3.10"
dependencies = [
  "evergis-tools>=0.1.0",
  "pydantic>=2.0",
  "geopandas",
  "pandas",
  "shapely",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["evergis_tutorial_setup"]
