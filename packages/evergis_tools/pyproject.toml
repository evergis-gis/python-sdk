[project]
name = "evergis-tools"
version = "0.2.0"
description = "High-level utilities for the EverGIS geospatial platform"
readme = "README.md"
license = "Apache-2.0"
authors = [{ name = "eldar", email = "eldarmamedov@gmail.com" }]
requires-python = ">=3.10"
dependencies = [
  "evergis-api>=0.1.0,<1.0.0",
  "pandas",
  "geopandas",
  "scipy>=1.16.1",
  # tiny, zero-dependency; lets Client() auto-load a .env without a separate step
  "python-dotenv>=1.0.0",
]

[project.optional-dependencies]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["evergis_tools"]
